name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out tested revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-*.txt
      - name: Install test dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Run tests
        run: python -m pytest
      - name: Check formatting and lint
        run: |
          ruff format --check .
          ruff check .
      - name: Validate the canonical registry
        run: map-collect --dry-run --status-file /tmp/map-collection-plan.json
      - name: Audit installed dependencies
        run: python -m pip_audit --local
      - name: Compile package and migration tools
        run: python -m compileall -q map_of_research scripts
