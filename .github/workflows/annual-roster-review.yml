name: Open annual faculty roster review

on:
  schedule:
    - cron: "17 13 1 7 *"
      timezone: America/New_York
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: annual-faculty-roster-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out trusted registry
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build review checklist
        run: |
          python -m pip install --no-deps .
          map-build-roster-review --output roster-review.md
      - name: Open one review issue for this year
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          review_year=$(date -u +%Y)
          review_title="Annual faculty roster review — $review_year"
          existing=$(gh issue list --state all --search "$review_title in:title" --json title --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh issue create --title "$review_title" --body-file roster-review.md
          fi
