name: Collect bounded Scholar snapshot

on:
  schedule:
    - cron: "17 4 * * 2"
      timezone: America/New_York
  workflow_dispatch:
    inputs:
      force_refresh:
        description: Ignore the one-year freshness window (still bounded to two profiles)
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: central-scholar-collection-v1
  cancel-in-progress: false

jobs:
  collect:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Check out trusted collector
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: source
          persist-credentials: false
      - name: Check out resumable snapshot branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: automation/map-snapshot
          path: snapshot
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: source/pyproject.toml
      - name: Install collector
        run: python -m pip install './source[collector]'
      - name: Synchronize the canonical registry
        id: registry
        run: |
          mkdir -p snapshot/registry
          cp source/registry/faculty.csv snapshot/registry/faculty.csv
          if git -C snapshot diff --quiet -- registry/faculty.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Collect at most two stale profiles
        id: collect
        working-directory: snapshot
        env:
          FORCE_REFRESH: ${{ inputs.force_refresh || false }}
        run: |
          set +e
          arguments=(
            --max-profiles 2
            --min-age-days 365
            --publication-limit 200
            --request-delay-seconds 90
          )
          if [[ "$FORCE_REFRESH" == "true" ]]; then
            arguments+=(--force)
          fi
          map-collect "${arguments[@]}"
          collector_exit_code=$?
          set -e
          refreshed_profiles=$(python -c 'import json; print(len(json.load(open("status/last-collection.json"))["refreshed_profile_ids"]))')
          echo "exit_code=$collector_exit_code" >> "$GITHUB_OUTPUT"
          echo "refreshed_profiles=$refreshed_profiles" >> "$GITHUB_OUTPUT"
      - name: Build and validate changed snapshot
        if: ${{ steps.collect.outputs.refreshed_profiles != '0' || steps.registry.outputs.changed == 'true' }}
        working-directory: snapshot
        run: |
          map-build-snapshot
          map-validate-snapshot \
            --snapshot snapshots/cmu-engineering-publications.parquet \
            --manifest snapshots/cmu-engineering-publications.parquet.manifest.json
      - name: Record cache, state, and receipts
        if: ${{ always() }}
        working-directory: snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry data status snapshots
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record bounded Scholar collection [skip ci]"
          git push origin HEAD:automation/map-snapshot
      - name: Surface collection failure after preserving state
        if: ${{ steps.collect.outputs.exit_code != '0' }}
        env:
          COLLECTOR_EXIT_CODE: ${{ steps.collect.outputs.exit_code }}
        run: exit "$COLLECTOR_EXIT_CODE"
