name: Publish central publication dataset

on:
  push:
    branches:
      - automation/map-snapshot
    paths:
      - snapshots/cmu-engineering-publications.parquet
      - snapshots/cmu-engineering-publications.parquet.manifest.json
  workflow_dispatch:
    inputs:
      snapshot_ref:
        description: Git ref containing the validated raw snapshot
        required: true
        default: automation/map-snapshot
        type: string

permissions:
  contents: write

concurrency:
  group: central-publication-upload-v1
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: huggingface
    env:
      SNAPSHOT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot_ref || github.sha }}
    steps:
      - name: Check out trusted publisher
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: source
          persist-credentials: false
      - name: Check out collected snapshot
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.SNAPSHOT_REF }}
          path: snapshot
          persist-credentials: true
          sparse-checkout: |
            snapshots/cmu-engineering-publications.parquet
            snapshots/cmu-engineering-publications.parquet.manifest.json
            status
          sparse-checkout-cone-mode: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: source/pyproject.toml
      - name: Install trusted publisher
        run: python -m pip install './source[publisher]'
      - name: Validate, enrich, and publish snapshot
        env:
          HF_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          map-publish-snapshot \
            --snapshot snapshot/snapshots/cmu-engineering-publications.parquet \
            --manifest snapshot/snapshots/cmu-engineering-publications.parquet.manifest.json \
            --status-file snapshot/status/last-upload.json
      - name: Record upload receipt
        if: ${{ always() }}
        working-directory: snapshot
        run: |
          if [ ! -f status/last-upload.json ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/last-upload.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record central dataset upload [skip ci]"
          git push origin HEAD:automation/map-snapshot
