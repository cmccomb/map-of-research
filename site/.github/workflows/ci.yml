name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out tested revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check JavaScript syntax
        run: node --check assets/map.js
      - name: Validate map configuration
        run: node -e 'const config = require("./map-config.json"); if (!config.map_slug || !config.title || !config.dataset_id) process.exit(1)'
      - name: Confirm static site files
        run: test -s index.html && test -s assets/map.css && test -s assets/map.js
